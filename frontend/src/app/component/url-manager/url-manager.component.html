<div class="container">

  <h1>Tiny URL</h1>

  <div class="create-box">

    <input
      type="text"
      placeholder="Enter URL to shorten"
      [(ngModel)]="url"
      name="url"
      appUrlPattern
      #urlModel="ngModel"
    />

    <label>
      <input type="checkbox" [(ngModel)]="isPrivate">
      Private
    </label>

    <button (click)="create()" [disabled]="urlModel.invalid">
      Generate
    </button>

  </div>

  <div class="create-error" *ngIf="urlModel.errors?.['invalidUrl'] && urlModel.touched">
    URL must start with http:// or https://
  </div>

  <h3>Public URLs</h3>

  <div class="search-box">

    <input
      type="text"
      placeholder="Search URLs..."
      [(ngModel)]="searchTerm"
      (input)="search()"
    />

  </div>

  <div *ngFor="let u of filteredUrls$ | async" class="url-card">

    <div class="short-url">

      <a [href]="u.shortUrl" target="_blank">
        {{u.shortUrl}}
      </a>

      <button (click)="copy(u.shortUrl)">Copy</button>

      <span>{{u.clickCount}} clicks</span>

      <button (click)="delete(u.shortCode)">Delete</button>

    </div>

    <div class="original-url">
      {{u.originalUrl}}
    </div>

  </div>

</div>
